{% extends 'base/base.html' %}

{% block title %}Already Applied{% endblock %}

{% block content %}
<div class="row mt-5">
    <div class="col-md-6 mx-auto text-center">
        <div class="card shadow p-5 border-0">
            <i class="bi bi-info-circle text-info" style="font-size: 4rem;"></i>
            <h3 class="mt-3">You have already applied!</h3>
            <p class="text-muted mt-2">You have already submitted an application for <strong>{{ job.title }}</strong>.</p>
            
            <div class="mt-4 gap-2 d-flex justify-content-center">
                <a href="{% url 'home' %}" class="btn btn-outline-primary">Browse Other Jobs</a>
                <a href="{% url 'student_dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
